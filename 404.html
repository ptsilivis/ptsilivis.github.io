<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Page not found · Panos Tsilivis</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://panostsilivis.com/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{--bg:#f7f5f0;--bg-2:#efece4;--ink:#16140e;--muted:#6f6b61;--line:#dbd6ca;--accent:#ff5a36;--accent-ink:#fff}
@media(prefers-color-scheme:dark){:root{--bg:#0b0b0d;--bg-2:#131318;--ink:#f2f0ea;--muted:#908d85;--line:#272730;--accent:#ff6a48;--accent-ink:#0b0b0d}}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;display:grid;place-items:center;padding:24px;min-height:100vh}
.wrap{max-width:560px;text-align:center}
.tag{display:inline-flex;align-items:center;gap:9px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:7px 14px;margin-bottom:26px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
h1{font-size:clamp(72px,20vw,140px);line-height:.9;letter-spacing:-.04em;font-weight:700;margin:0}
h1 span{color:var(--accent)}
p{font-size:clamp(16px,2.2vw,19px);line-height:1.6;color:var(--muted);margin:18px 0 32px}
.btn{text-decoration:none;background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:15px;padding:14px 24px;border-radius:12px;display:inline-block;box-shadow:0 6px 20px -8px var(--accent);transition:transform .16s cubic-bezier(.23,1,.32,1)}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(-1px) scale(.97)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag"><span class="dot"></span>Error 404 · route not found</div>
    <h1>4<span>0</span>4</h1>
    <p>This page took a wrong turn — the trajectory doesn't exist. Let's get you back on the main road.</p>
    <a class="btn" href="/">← Back to home</a>
  </div>
</body>
</html>
